name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: nonet-movie-deb
          path: dist/*.deb
          if-no-files-found: error

  build-macos-pkg:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build .pkg
        run: |
          chmod +x scripts/build-macos-pkg.sh
          ./scripts/build-macos-pkg.sh

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v7
        with:
          name: nonet-movie-macos-pkg
          path: dist/*.pkg
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build .exe
        shell: pwsh
        run: |
          ./scripts/build-windows-exe.ps1

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: nonet-movie-windows-exe
          path: dist/*.exe
          if-no-files-found: error

  verify-deb:
    name: Verify Debian installer
    runs-on: ubuntu-latest
    needs: build-deb
    container:
      image: debian:bookworm-slim

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v7
        with:
          name: nonet-movie-deb
          path: verify-assets/deb

      - name: Install .deb and run health check
        run: |
          deb_file="$(ls verify-assets/deb/*.deb 2>/dev/null | head -n 1 || true)"
          if [ -z "$deb_file" ]; then
            echo "No .deb found for verification."
            exit 1
          fi

          apt-get update
          case "$deb_file" in
            /*) deb_path="$deb_file" ;;
            *) deb_path="./$deb_file" ;;
          esac
          apt-get install -y "$deb_path" || (dpkg -i "$deb_path" && apt-get install -f -y)

          set +e
          health_output="$(nonet-movie --health 2>&1)"
          exit_code=$?
          set -e
          echo "$health_output"

          if [ "$exit_code" -ne 0 ]; then
            echo "nonet-movie --health exited with code $exit_code"
            exit 1
          fi

          if ! printf '%s' "$health_output" | grep -q "OK"; then
            echo "nonet-movie --health did not print OK"
            exit 1
          fi

  verify-macos-pkg:
    name: Verify macOS package
    runs-on: macos-latest
    needs: build-macos-pkg

    steps:
      - name: Download .pkg artifact
        uses: actions/download-artifact@v7
        with:
          name: nonet-movie-macos-pkg
          path: verify-assets/pkg

      - name: Install pkg and run health check
        run: |
          shopt -s nullglob
          pkg_files=(verify-assets/pkg/*.pkg)
          if [ ${#pkg_files[@]} -eq 0 ]; then
            echo "No .pkg found for verification."
            exit 1
          fi

          sudo installer -pkg "${pkg_files[0]}" -target /

          set +e
          health_output="$(/usr/local/bin/nonet-movie --health 2>&1)"
          exit_code=$?
          set -e
          echo "$health_output"

          if [ "$exit_code" -ne 0 ]; then
            echo "nonet-movie --health exited with code $exit_code"
            exit 1
          fi

          if [[ "$health_output" != *"OK"* ]]; then
            echo "nonet-movie --health did not print OK"
            exit 1
          fi

  verify-windows-exe:
    name: Verify Windows executable
    runs-on: windows-latest
    needs: build-windows-exe

    steps:
      - name: Download .exe artifact
        uses: actions/download-artifact@v7
        with:
          name: nonet-movie-windows-exe
          path: verify-assets/exe

      - name: Run executable health check
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "verify-assets/exe" -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No .exe found for verification."
          }

          $healthOutput = & $exe.FullName --health 2>&1
          $exitCode = $LASTEXITCODE
          $healthText = ($healthOutput | Out-String).Trim()
          Write-Host $healthText

          if ($exitCode -ne 0) {
            throw "Installer --health exited with code $exitCode."
          }

          if ($healthText -notmatch 'OK') {
            throw "Installer --health did not print OK."
          }

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify-deb
      - verify-macos-pkg
      - verify-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v7
        with:
          name: nonet-movie-deb
          path: release-assets/deb

      - name: Download .pkg artifact
        uses: actions/download-artifact@v7
        with:
          name: nonet-movie-macos-pkg
          path: release-assets/pkg

      - name: Download .exe artifact
        uses: actions/download-artifact@v7
        with:
          name: nonet-movie-windows-exe
          path: release-assets/exe

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag="${GITHUB_REF_NAME}"
          files=(
            release-assets/deb/*.deb
            release-assets/pkg/*.pkg
            release-assets/exe/*.exe
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --generate-notes
          fi
