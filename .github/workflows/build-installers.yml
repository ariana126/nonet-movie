name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-deb
          path: dist/*.deb
          if-no-files-found: error

  build-macos-pkg:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .pkg
        run: |
          chmod +x scripts/build-macos-pkg.sh
          ./scripts/build-macos-pkg.sh

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-macos-pkg
          path: dist/*.pkg
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .exe
        shell: pwsh
        run: |
          ./scripts/build-windows-exe.ps1

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-windows-exe
          path: dist/*.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-macos-pkg
      - build-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-deb
          path: release-assets/deb

      - name: Download .pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-macos-pkg
          path: release-assets/pkg

      - name: Download .exe artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-windows-exe
          path: release-assets/exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/deb/*.deb
            release-assets/pkg/*.pkg
            release-assets/exe/*.exe
