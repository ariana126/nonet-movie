name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          PYTHON_BIN=/usr/bin/python3 ./scripts/build-deb.sh

      - name: Verify .deb health check
        run: |
          shopt -s nullglob
          deb_files=(dist/*.deb)
          if [ ${#deb_files[@]} -eq 0 ]; then
            echo "No .deb found in dist/ for verification."
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y "./${deb_files[0]}"

          set +e
          health_output="$(nonet-movie --health 2>&1)"
          exit_code=$?
          set -e
          echo "$health_output"

          if [ "$exit_code" -ne 0 ]; then
            echo "nonet-movie --health exited with code $exit_code"
            exit 1
          fi

          if [[ "$health_output" != *"OK"* ]]; then
            echo "nonet-movie --health did not print OK"
            exit 1
          fi

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-deb
          path: dist/*.deb
          if-no-files-found: error

  build-macos-pkg:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build .pkg
        run: |
          chmod +x scripts/build-macos-pkg.sh
          PYTHON_BIN=/usr/bin/python3 ./scripts/build-macos-pkg.sh

      - name: Verify .pkg health check
        run: |
          shopt -s nullglob
          pkg_files=(dist/*.pkg)
          if [ ${#pkg_files[@]} -eq 0 ]; then
            echo "No .pkg found in dist/ for verification."
            exit 1
          fi

          sudo installer -pkg "${pkg_files[0]}" -target /

          set +e
          health_output="$(/usr/local/bin/nonet-movie --health 2>&1)"
          exit_code=$?
          set -e
          echo "$health_output"

          if [ "$exit_code" -ne 0 ]; then
            echo "nonet-movie --health exited with code $exit_code"
            exit 1
          fi

          if [[ "$health_output" != *"OK"* ]]; then
            echo "nonet-movie --health did not print OK"
            exit 1
          fi

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-macos-pkg
          path: dist/*.pkg
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build .exe
        shell: pwsh
        run: |
          ./scripts/build-windows-exe.ps1

      - name: Verify .exe health check
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No .exe found in dist/ for verification."
          }

          $healthOutput = & $exe.FullName --health 2>&1
          $exitCode = $LASTEXITCODE
          $healthText = ($healthOutput | Out-String).Trim()
          Write-Host $healthText

          if ($exitCode -ne 0) {
            throw "Installer --health exited with code $exitCode."
          }

          if ($healthText -notmatch 'OK') {
            throw "Installer --health did not print OK."
          }

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-windows-exe
          path: dist/*.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-macos-pkg
      - build-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-deb
          path: release-assets/deb

      - name: Download .pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-macos-pkg
          path: release-assets/pkg

      - name: Download .exe artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-windows-exe
          path: release-assets/exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/deb/*.deb
            release-assets/pkg/*.pkg
            release-assets/exe/*.exe
