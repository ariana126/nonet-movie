name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          PYTHON_BIN=/usr/bin/python3 ./scripts/build-deb.sh

      - name: Verify .deb installs and app starts
        run: |
          shopt -s nullglob
          deb_files=(dist/*.deb)
          if [ ${#deb_files[@]} -eq 0 ]; then
            echo "No .deb found in dist/ for verification."
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y "./${deb_files[0]}"

          echo "Launching nonet-movie for smoke verification..."
          nonet-movie > /tmp/nonet-movie-smoke.log 2>&1 &
          app_pid=$!
          sleep 20

          if kill -0 "$app_pid" 2>/dev/null; then
            echo "nonet-movie is running; terminating process after timeout to continue pipeline."
            kill "$app_pid"
            sleep 2
            if kill -0 "$app_pid" 2>/dev/null; then
              kill -9 "$app_pid"
            fi
          else
            set +e
            wait "$app_pid"
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ]; then
              echo "nonet-movie exited early with code $exit_code"
              cat /tmp/nonet-movie-smoke.log
              exit 1
            fi
            echo "nonet-movie exited during timeout window with code 0."
          fi

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-deb
          path: dist/*.deb
          if-no-files-found: error

  build-macos-pkg:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .pkg
        run: |
          chmod +x scripts/build-macos-pkg.sh
          PYTHON_BIN=/usr/bin/python3 ./scripts/build-macos-pkg.sh

      - name: Verify .pkg installs and app starts
        run: |
          shopt -s nullglob
          pkg_files=(dist/*.pkg)
          if [ ${#pkg_files[@]} -eq 0 ]; then
            echo "No .pkg found in dist/ for verification."
            exit 1
          fi

          sudo installer -pkg "${pkg_files[0]}" -target /

          echo "Launching nonet-movie for smoke verification..."
          /usr/local/bin/nonet-movie > /tmp/nonet-movie-smoke.log 2>&1 &
          app_pid=$!
          sleep 20

          if kill -0 "$app_pid" 2>/dev/null; then
            echo "nonet-movie is running; terminating process after timeout to continue pipeline."
            kill "$app_pid"
            sleep 2
            if kill -0 "$app_pid" 2>/dev/null; then
              kill -9 "$app_pid"
            fi
          else
            set +e
            wait "$app_pid"
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ]; then
              echo "nonet-movie exited early with code $exit_code"
              cat /tmp/nonet-movie-smoke.log
              exit 1
            fi
            echo "nonet-movie exited during timeout window with code 0."
          fi

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-macos-pkg
          path: dist/*.pkg
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build .exe
        shell: pwsh
        run: |
          ./scripts/build-windows-exe.ps1

      - name: Verify .exe starts without errors
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No .exe found in dist/ for verification."
          }

          Write-Host "Launching $($exe.FullName) for smoke verification..."
          $process = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 20
          $process.Refresh()

          if ($process.HasExited) {
            if ($process.ExitCode -ne 0) {
              throw "Installer exited early with code $($process.ExitCode)."
            }
            Write-Host "Installer exited during timeout window with code 0."
          } else {
            Write-Host "Installer is running; terminating process after timeout to continue pipeline."
            Stop-Process -Id $process.Id -Force
          }

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonet-movie-windows-exe
          path: dist/*.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-macos-pkg
      - build-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-deb
          path: release-assets/deb

      - name: Download .pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-macos-pkg
          path: release-assets/pkg

      - name: Download .exe artifact
        uses: actions/download-artifact@v4
        with:
          name: nonet-movie-windows-exe
          path: release-assets/exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/deb/*.deb
            release-assets/pkg/*.pkg
            release-assets/exe/*.exe
